<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanSat - Estación Terrena</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Fondo animado de estrellas */
        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 1px;
            height: 1px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Contenedor principal */
        .landing-container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 800px;
            width: 90%;
        }

        /* CubeSat animado (SVG simulado con CSS) */
        .cubesat-container {
            margin: 0 auto 50px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .cubesat {
            width: 150px;
            height: 150px;
            position: relative;
            animation: rotate 8s infinite linear;
            transform-style: preserve-3d;
        }

        @keyframes rotate {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        .cubesat-face {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 2px solid #5a7a99;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #a8b8cc;
            background: rgba(90, 122, 153, 0.1);
        }

        .face-front { transform: translateZ(75px); background: linear-gradient(135deg, rgba(90, 122, 153, 0.2), rgba(168, 184, 204, 0.1)); }
        .face-back { transform: rotateY(180deg) translateZ(75px); }
        .face-right { transform: rotateY(90deg) translateZ(75px); }
        .face-left { transform: rotateY(-90deg) translateZ(75px); }
        .face-top { transform: rotateX(90deg) translateZ(75px); background: linear-gradient(135deg, #5a7a99, #8b949e); }
        .face-bottom { transform: rotateX(-90deg) translateZ(75px); }

        /* Paneles solares */
        .solar-panel {
            position: absolute;
            background: linear-gradient(135deg, #1a5f3f, #2a8f5f);
            border: 1px solid #3aaf7f;
            opacity: 0.8;
        }

        .panel-1 { width: 30px; height: 150px; left: -45px; top: 0; animation: flutter-left 3s ease-in-out infinite; }
        .panel-2 { width: 30px; height: 150px; right: -45px; top: 0; animation: flutter-right 3s ease-in-out infinite; }

        @keyframes flutter-left {
            0%, 100% { transform: rotateY(-25deg); }
            50% { transform: rotateY(-45deg); }
        }

        @keyframes flutter-right {
            0%, 100% { transform: rotateY(25deg); }
            50% { transform: rotateY(45deg); }
        }

        /* Antena */
        .antenna {
            position: absolute;
            width: 3px;
            height: 80px;
            background: linear-gradient(to bottom, #a8b8cc, #5a7a99);
            left: 50%;
            top: -80px;
            margin-left: -1.5px;
            animation: sway 4s ease-in-out infinite;
            transform-origin: bottom center;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(5deg); }
        }

        /* Contenido de texto */
        .landing-content {
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3.5em;
            color: #a8b8cc;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(168, 184, 204, 0.3);
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 1.3em;
            color: #8b949e;
            margin-bottom: 50px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .description {
            font-size: 1em;
            color: #8b949e;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Botón de entrada */
        .enter-btn {
            display: inline-block;
            padding: 16px 50px;
            font-size: 1.1em;
            font-weight: 700;
            color: #0d1117;
            background: linear-gradient(135deg, #a8b8cc, #5a7a99);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(168, 184, 204, 0.2);
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #5a7a99, #a8b8cc);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .enter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(168, 184, 204, 0.4);
        }

        .enter-btn:hover::before {
            left: 0;
        }

        /* Indicadores LED */
        .led-group {
            position: absolute;
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
            width: 100%;
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        .led-green { background: #2aff2a; box-shadow: 0 0 10px #2aff2a; animation-delay: 0s; }
        .led-blue { background: #2aafff; box-shadow: 0 0 10px #2aafff; animation-delay: 0.5s; }
        .led-red { background: #ff2a2a; box-shadow: 0 0 10px #ff2a2a; animation-delay: 1s; }

        @keyframes blink {
            0%, 49%, 100% { opacity: 1; }
            50%, 99% { opacity: 0.3; }
        }

        /* Footer */
        .landing-footer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 0.8em;
            color: #8b949e;
            z-index: 1;
        }
    </style>
</head>
<body>

<!-- Estrellas de fondo -->
<div class="stars" id="starsContainer"></div>

<!-- Contenedor principal -->
<div class="landing-container">
    <!-- CubeSat -->
    <div class="cubesat-container">
        <div class="antenna"></div>
        <div class="cubesat">
            <div class="cubesat-face face-front">📡</div>
            <div class="cubesat-face face-back">⚙️</div>
            <div class="cubesat-face face-right">🔋</div>
            <div class="cubesat-face face-left">📊</div>
            <div class="cubesat-face face-top">☀️</div>
            <div class="cubesat-face face-bottom">📡</div>
        </div>
        <div class="solar-panel panel-1"></div>
        <div class="solar-panel panel-2"></div>
    </div>

    <!-- Contenido -->
    <div class="landing-content">
        <h1>CUBESAT</h1>
        <p class="subtitle">ESTACIÓN TERRENA</p>
        <p class="description">
            Sistema de monitoreo en tiempo real<br>
            para satélites CanSat
        </p>

        <!-- Botón de entrada -->
        <a href="index.html" class="enter-btn">ENTRAR</a>

        <!-- LEDs indicadores -->
        <div class="led-group">
            <div class="led led-green"></div>
            <div class="led led-blue"></div>
            <div class="led led-red"></div>
        </div>
    </div>
</div>

<!-- Footer -->
<div class="landing-footer">
    © 2026 CanSat Project
</div>

<script>
    // Generar estrellas aleatorias
    const starsContainer = document.getElementById('starsContainer');
    for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        starsContainer.appendChild(star);
    }
</script>

</body>
</html>
